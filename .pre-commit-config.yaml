minimum_pre_commit_version: '3.0.3'

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: check-case-conflict
    -   id: check-executables-have-shebangs
    -   id: check-json
    -   id: check-merge-conflict
    -   id: check-shebang-scripts-are-executable
    -   id: check-symlinks
    -   id: check-toml
    -   id: check-vcs-permalinks
    -   id: check-xml
    -   id: check-yaml
    -   id: double-quote-string-fixer  # TODO: check if this works like flake8-quotes
    #-   id: end-of-file-fixer  # replaced by autopep8 W292 and W391
    -   id: fix-encoding-pragma
        args: [--remove]
    -   id: mixed-line-ending
        args: [--fix=lf]
    -   id: pretty-format-json
        args: [--autofix, --indent=4]
    #-   id: trailing-whitespace  # replaced by autopep8 W291 and W293
    
-   repo: https://github.com/pre-commit/mirrors-autopep8
    rev: v2.0.1
    hooks:
    -   id: autopep8
        args:
        -   --in-place
        -   --ignore
        -   E12,E13,E501,E71,E72,W5,W6

-   repo: https://github.com/pycqa/isort
    rev: '5.12.0'
    hooks:
    -   id: isort
        args:
        -   --add-import
        -   'from __future__ import annotations'
        -   --lines-after-imports=2
        -   --remove-redundant-aliases
        # TODO: known-local-folder?

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v0.991
    hooks:
    -   id: mypy
        args:  # Removes default `--ignore-missing-imports`
        -   --show-error-codes
        -   --pretty
        -   --enable-error-code=redundant-self,redundant-expr,truthy-bool,truthy-iterable,ignore-without-code,unused-awaitable
        warn_unused_configs = True
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
# disallow_any_unimported = True  # It already warns for the import
disallow_any_generics = True
disallow_any_explicit = True
disallow_subclassing_any = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True
no_implicit_reexport = True
strict_concatenate = True
strict_equality = True
no_implicit_optional = False
        
        additional_dependencies: []  # Add dependencies (including stubs) here

-   repo: https://github.com/asottile/add-trailing-comma
    rev: v2.4.0
    hooks:
    -   id: add-trailing-comma
        args: [--py36-plus]

-   repo: https://github.com/asottile/pyupgrade
    rev: v3.3.1
    hooks:
    -   id: pyupgrade
        args:
        -   --py37-plus
